<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>셀모임 장소 예약</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#3B5998;--primary-light:#E8EDF5;--primary-dark:#2D4373;
  --accent:#7B9E4A;--accent-light:#EEF4E4;
  --danger:#C0392B;--danger-light:#FDEDEC;
  --text:#2C2C2A;--text-muted:#6B6B69;--border:#D8D8D4;
  --bg:#F4F2EC;--card:#FFFFFF;
  --success:#1D6E4A;--success-light:#E4F4ED;
  --warn-bg:#FEF7E6;--warn-text:#8A5C00;
}
body{font-family:-apple-system,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}

/* Header */
.header{background:var(--primary);color:white;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.header-inner{max-width:860px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px;}
#logoImg{height:42px;width:auto;object-fit:contain;display:block;background:white;border-radius:6px;padding:3px 6px;}
.header-text h1{font-size:17px;font-weight:700;line-height:1.2;}
.header-text p{font-size:11px;opacity:0.72;margin-top:2px;}
.tabs{background:var(--primary-dark);display:flex;max-width:860px;margin:0 auto;}
.tab-btn{flex:1;background:none;border:none;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;padding:9px 2px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;font-family:inherit;}
.tab-btn.active{color:#fff;border-bottom-color:#F0C040;}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.85);}

/* Layout */
.main{max-width:860px;margin:0 auto;padding:16px 14px 48px;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:5px;}

/* Inputs */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:5px;}
input[type="text"],input[type="date"],select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;color:var(--text);background:white;outline:none;}
input[type="text"]:focus,input[type="date"]:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,89,152,.1);}
textarea{resize:vertical;min-height:60px;}

/* Room Grid */
.room-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.room-btn{background:white;border:1.5px solid var(--border);border-radius:9px;padding:10px 6px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text-muted);text-align:center;transition:all .13s;font-family:inherit;line-height:1.3;}
.room-btn .ri{font-size:18px;display:block;margin-bottom:4px;}
.room-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.room-btn.selected{border-color:var(--primary);background:var(--primary);color:white;}

/* Slot Grid */
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.slot-btn{background:white;border:1.5px solid var(--border);border-radius:8px;padding:9px 4px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text-muted);text-align:center;transition:all .13s;font-family:inherit;line-height:1.4;}
.slot-btn:hover:not(.booked){border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.slot-btn.selected{border-color:var(--primary);background:var(--primary);color:white;}
.slot-btn.booked{background:var(--danger-light);border-color:#E8A9A4;color:var(--danger);cursor:not-allowed;}
.slot-btn.preview{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}

/* Duration */
.dur-wrap{margin-top:12px;}
.dur-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:7px;}
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.dur-btn{background:white;border:1.5px solid var(--border);border-radius:9px;padding:9px 4px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text-muted);text-align:center;transition:all .13s;font-family:inherit;}
.dur-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.dur-btn.selected{border-color:var(--primary);background:var(--primary);color:white;}

/* Time Result */
.time-result{margin-top:10px;padding:10px 13px;border-radius:8px;font-size:13px;font-weight:700;display:none;}
.time-result.ok{background:var(--success-light);color:var(--success);display:block;}
.time-result.bad{background:var(--danger-light);color:var(--danger);display:block;}
.time-result.warn{background:var(--warn-bg);color:var(--warn-text);display:block;}

/* Submit */
.btn-submit{width:100%;background:var(--primary);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px;}
.btn-submit:hover{background:var(--primary-dark);}

/* List */
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.filter-row select,.filter-row input{flex:1;min-width:130px;padding:8px 11px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;color:var(--text);background:white;outline:none;}
.res-item{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.res-item.past{opacity:.55;}
.res-left{flex:1;min-width:0;}
.res-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.badge-room{background:var(--primary-light);color:var(--primary);}
.badge-time{background:var(--accent-light);color:var(--accent);}
.badge-done{background:#EDEDEB;color:#888;}
.res-main{font-size:15px;font-weight:700;color:var(--text);}
.res-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.btn-cancel{background:none;border:1.5px solid var(--danger);color:var(--danger);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .13s;flex-shrink:0;}
.btn-cancel:hover{background:var(--danger);color:white;}
.empty-state{text-align:center;padding:44px 20px;color:var(--text-muted);}
.empty-state .ei{font-size:44px;margin-bottom:10px;}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{background:none;border:1.5px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .13s;font-family:inherit;}
.cal-nav:hover{background:var(--primary-light);}
.cal-month{font-size:16px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dh{text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:5px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px;border-radius:8px;cursor:pointer;transition:background .13s;min-height:40px;}
.cal-day:hover{background:var(--primary-light);}
.cal-day.today{background:var(--primary-light);}
.cal-day.today .dn{color:var(--primary);font-weight:800;}
.cal-day.sel{background:var(--primary);}
.cal-day.sel .dn{color:white!important;font-weight:800;}
.cal-day.other .dn{color:#CCC;}
.cal-day.sun .dn{color:#C0392B;}
.cal-day.sat .dn{color:#2980B9;}
.dn{font-size:12px;line-height:1;margin-bottom:2px;}
.dot-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--primary);}
.cal-day.sel .dot{background:rgba(255,255,255,.8);}
.day-detail{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-top:12px;}
.dd-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.tl-item{display:flex;gap:8px;margin-bottom:7px;align-items:stretch;}
.tl-time{font-size:11px;font-weight:700;color:var(--text-muted);min-width:40px;padding-top:3px;}
.tl-bar{width:3px;background:var(--primary);border-radius:2px;flex-shrink:0;}
.tl-body{flex:1;background:var(--primary-light);border-radius:6px;padding:5px 8px;font-size:12px;}
.tl-name{font-weight:700;color:var(--primary);}
.tl-info{color:var(--text-muted);margin-top:1px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px;text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:var(--primary);}
.stat-lbl{font-size:12px;color:var(--text-muted);margin-top:2px;}
.ru-item{margin-bottom:9px;}
.ru-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.ru-name{font-weight:600;}
.ru-cnt{color:var(--text-muted);}
.ru-bg{background:#EDEDEB;border-radius:4px;height:7px;overflow:hidden;}
.ru-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .4s;}

/* ─── Settings ─── */
.set-section{margin-bottom:20px;}
.set-section-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* Logo preview */
.logo-preview-wrap{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.logo-preview-box{background:#f0f0ee;border-radius:8px;border:1px solid var(--border);padding:8px 14px;min-width:140px;height:56px;display:flex;align-items:center;justify-content:center;}
#settingsLogoPreview{max-height:42px;max-width:180px;object-fit:contain;}
.btn-file{display:inline-block;background:var(--primary-light);color:var(--primary);border:1.5px solid var(--primary);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-file:hover{background:var(--primary);color:white;}
input[type="file"]{display:none;}

/* Room list in settings */
.room-list-item{display:flex;align-items:center;gap:8px;padding:9px 10px;background:white;border:1px solid var(--border);border-radius:9px;margin-bottom:6px;}
.room-list-icon{font-size:18px;min-width:24px;text-align:center;}
.room-list-name{flex:1;font-size:14px;font-weight:600;}
.room-list-btns{display:flex;gap:5px;flex-shrink:0;}
.btn-edit-room{background:var(--primary-light);color:var(--primary);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-del-room{background:var(--danger-light);color:var(--danger);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-room-form{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.add-room-form input{flex:2;min-width:120px;}
.add-room-form .icon-input{flex:0 0 70px;min-width:60px;}
.btn-add-room{background:var(--primary);color:white;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-add-room:hover{background:var(--primary-dark);}

/* Save settings button */
.btn-save-settings{background:var(--success);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:8px;}
.btn-save-settings:hover{background:#145c38;}

/* Edit room modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:14px;padding:22px;max-width:380px;width:100%;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-field{margin-bottom:11px;}
.modal-field label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:4px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.btn-mno{flex:1;background:none;border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text-muted);}
.btn-myes{flex:1;background:var(--primary);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:white;}
.btn-danger{background:var(--danger);}

/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#2C2C2A;color:white;padding:11px 22px;border-radius:22px;font-size:14px;font-weight:600;z-index:1000;transition:transform .25s ease;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.18);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--success);}
.toast.err{background:var(--danger);}

@media(max-width:480px){
  .room-grid{grid-template-columns:repeat(2,1fr);}
  .slot-grid{grid-template-columns:repeat(2,1fr);}
  .dur-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <img id="logoImg" src="" alt="교회 로고" />
    <div class="header-text">
      <h1 id="headerTitle">셀모임 장소 예약</h1>
      <p id="headerSubtitle">30분 단위 · 최대 2시간</p>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('book')">✏️ 예약</button>
    <button class="tab-btn" onclick="switchTab('list')">📋 현황</button>
    <button class="tab-btn" onclick="switchTab('calendar')">📅 캘린더</button>
    <button class="tab-btn" onclick="switchTab('stats')">📊 통계</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️ 설정</button>
  </div>
</div>

<div class="main">

  <!-- 예약하기 -->
  <div class="section active" id="sec-book">
    <div class="card">
      <div class="card-title">🏠 장소 선택</div>
      <div class="room-grid" id="roomGrid"></div>
    </div>
    <div class="card">
      <div class="card-title">📅 날짜</div>
      <input type="date" id="resDate" />
    </div>
    <div class="card">
      <div class="card-title">🕐 시간 선택 <span style="font-size:11px;font-weight:500;color:var(--text-muted);margin-left:4px;">30분 단위 · 최대 2시간</span></div>
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">시작 시간</div>
      <div class="slot-grid" id="slotGrid"></div>
      <div class="dur-wrap">
        <div class="dur-label">이용 시간</div>
        <div class="dur-grid">
          <button class="dur-btn" id="dur_1" onclick="selectDur(1)">30분</button>
          <button class="dur-btn" id="dur_2" onclick="selectDur(2)">1시간</button>
          <button class="dur-btn" id="dur_3" onclick="selectDur(3)">1시간 30분</button>
          <button class="dur-btn" id="dur_4" onclick="selectDur(4)">2시간</button>
        </div>
      </div>
      <div class="time-result" id="timeResult"></div>
    </div>
    <div class="card">
      <div class="card-title">✍️ 예약 정보</div>
      <div class="form-row">
        <div class="form-group">
          <label>셀 이름</label>
          <input type="text" id="cellName" placeholder="예: 1셀, 믿음셀..." />
        </div>
        <div class="form-group">
          <label>예약자 이름</label>
          <input type="text" id="personName" placeholder="이름" />
        </div>
      </div>
    </div>
    <button class="btn-submit" onclick="submitReservation()">예약 완료</button>
  </div>

  <!-- 예약현황 -->
  <div class="section" id="sec-list">
    <div class="card" style="padding:12px;">
      <div class="filter-row">
        <select id="filterRoom" onchange="renderList()"><option value="">전체 장소</option></select>
        <input type="date" id="filterDate" onchange="renderList()" />
        <input type="text" id="filterSearch" oninput="renderList()" placeholder="🔍 셀명 / 이름 검색" />
      </div>
    </div>
    <div id="resList"></div>
  </div>

  <!-- 캘린더 -->
  <div class="section" id="sec-calendar">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="day-detail" id="dayDetail" style="display:none;">
      <div class="dd-title" id="ddTitle"></div>
      <div id="ddContent"></div>
    </div>
  </div>

  <!-- 통계 -->
  <div class="section" id="sec-stats">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card"><div class="card-title">📊 장소별 예약 횟수</div><div id="roomBars"></div></div>
    <div class="card"><div class="card-title">📅 월별 예약 추이</div><div id="monthBars"></div></div>
  </div>

  <!-- 설정 -->
  <div class="section" id="sec-settings">

    <!-- 로고 -->
    <div class="card">
      <div class="set-section-title">🖼️ 교회 로고</div>
      <div class="logo-preview-wrap">
        <div class="logo-preview-box">
          <img id="settingsLogoPreview" src="" alt="로고 미리보기" />
        </div>
        <div>
          <label class="btn-file" for="logoFileInput">📁 이미지 선택</label>
          <input type="file" id="logoFileInput" accept="image/*" onchange="onLogoFile(this)" />
          <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">PNG, JPG, SVG 지원</p>
          <button onclick="resetLogo()" style="margin-top:6px;background:none;border:none;font-size:12px;color:var(--danger);cursor:pointer;font-family:inherit;font-weight:700;">기본 로고로 초기화</button>
        </div>
      </div>
    </div>

    <!-- 타이틀 -->
    <div class="card">
      <div class="set-section-title">✏️ 타이틀 수정</div>
      <div class="form-group" style="margin-bottom:10px;">
        <label>메인 타이틀</label>
        <input type="text" id="setTitle" placeholder="셀모임 장소 예약" />
      </div>
      <div class="form-group">
        <label>서브 타이틀</label>
        <input type="text" id="setSubtitle" placeholder="30분 단위 · 최대 2시간" />
      </div>
    </div>

    <!-- 장소 관리 -->
    <div class="card">
      <div class="set-section-title">🏠 장소 관리</div>
      <div id="roomListSettings"></div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">새 장소 추가</div>
        <div class="add-room-form">
          <input class="icon-input" type="text" id="newRoomIcon" placeholder="🏠" maxlength="2" />
          <input type="text" id="newRoomName" placeholder="장소명 입력" />
          <button class="btn-add-room" onclick="addRoom()">추가</button>
        </div>
      </div>
    </div>

    <button class="btn-save-settings" onclick="saveSettings()">✅ 설정 저장</button>
  </div>

</div>

<!-- Edit Room Modal -->
<div class="modal-overlay" id="editRoomModal">
  <div class="modal">
    <h3>장소 수정</h3>
    <div class="modal-field">
      <label>아이콘 (이모지)</label>
      <input type="text" id="editRoomIcon" maxlength="2" style="width:80px;" />
    </div>
    <div class="modal-field">
      <label>장소명</label>
      <input type="text" id="editRoomName" />
    </div>
    <div class="modal-btns">
      <button class="btn-mno" onclick="closeEditModal()">취소</button>
      <button class="btn-myes" onclick="saveEditRoom()">저장</button>
    </div>
  </div>
</div>

<!-- Cancel Confirm Modal -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal">
    <h3>예약 취소</h3>
    <p id="cancelText" style="font-size:13px;color:var(--text-muted);margin-bottom:18px;line-height:1.6;"></p>
    <div class="modal-btns">
      <button class="btn-mno" onclick="closeModal('cancelModal')">닫기</button>
      <button class="btn-myes btn-danger" onclick="confirmCancel()">취소 확인</button>
    </div>

function buildSlots(){const s=[];for(let h=9;h<=21;h++){s.push(`${String(h).padStart(2,'0')}:00`);if(h<21)s.push(`${String(h).padStart(2,'0')}:30`);}s.push('21:30');return s;}
const SLOTS=buildSlots();
function addSlots(start,n){const i=SLOTS.indexOf(start);return(i>=0&&i+n<SLOTS.length)?SLOTS[i+n]:null;}

/* ──────────── STATE ──────────── */
let reservations=[], rooms=[], settings={};
let selRoom=null, selStart=null, selDur=0;
let cancelId=null, editRoomId=null, delRoomId=null;
let calYear, calMonth, selCalDate=null;

/* ──────────── STORAGE ──────────── */
function loadAll(){
  try{const d=localStorage.getItem('cell_res_v3');if(d)reservations=JSON.parse(d);}catch(e){}
  try{
    const s=localStorage.getItem('cell_settings');
    if(s) settings=JSON.parse(s);
    else settings={title:'셀모임 장소 예약',subtitle:'30분 단위 · 최대 2시간',logo:DEFAULT_LOGO};
  }catch(e){settings={title:'셀모임 장소 예약',subtitle:'30분 단위 · 최대 2시간',logo:DEFAULT_LOGO};}
  try{const r=localStorage.getItem('cell_rooms');if(r)rooms=JSON.parse(r);else rooms=JSON.parse(JSON.stringify(DEFAULT_ROOMS));}catch(e){rooms=JSON.parse(JSON.stringify(DEFAULT_ROOMS));}
}
function saveRes(){try{localStorage.setItem('cell_res_v3',JSON.stringify(reservations));}catch(e){}}
function saveSettings(){
  settings.title=document.getElementById('setTitle').value.trim()||'셀모임 장소 예약';
  settings.subtitle=document.getElementById('setSubtitle').value.trim()||'30분 단위 · 최대 2시간';
  try{localStorage.setItem('cell_settings',JSON.stringify(settings));}catch(e){}
  try{localStorage.setItem('cell_rooms',JSON.stringify(rooms));}catch(e){}
  applySettings();
  buildRoomGrid();
  buildFilterOptions();
  renderRoomListSettings();
  showToast('✅ 설정이 저장되었습니다','ok');
}
function saveRoomsOnly(){try{localStorage.setItem('cell_rooms',JSON.stringify(rooms));}catch(e){}}
function genId(){return 'r'+Date.now()+Math.random().toString(36).substr(2,5);}

/* ──────────── APPLY SETTINGS ──────────── */
function applySettings(){
  document.getElementById('headerTitle').textContent=settings.title||'셀모임 장소 예약';
  document.getElementById('headerSubtitle').textContent=settings.subtitle||'30분 단위 · 최대 2시간';
  const logo=settings.logo||DEFAULT_LOGO;
  document.getElementById('logoImg').src=logo;
  document.getElementById('settingsLogoPreview').src=logo;
  document.getElementById('setTitle').value=settings.title||'';
  document.getElementById('setSubtitle').value=settings.subtitle||'';
}

/* ──────────── LOGO ──────────── */
function onLogoFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    settings.logo=e.target.result;
    document.getElementById('logoImg').src=settings.logo;
    document.getElementById('settingsLogoPreview').src=settings.logo;
  };
  reader.readAsDataURL(file);
}
function resetLogo(){settings.logo=DEFAULT_LOGO;document.getElementById('logoImg').src=DEFAULT_LOGO;document.getElementById('settingsLogoPreview').src=DEFAULT_LOGO;}

/* ──────────── TOAST ──────────── */
let _tt;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',2800);}

/* ──────────── TABS ──────────── */
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[['book','list','calendar','stats','settings'].indexOf(tab)].classList.add('active');
  if(tab==='list')renderList();
  if(tab==='calendar')renderCalendar();
  if(tab==='stats')renderStats();
  if(tab==='settings')renderRoomListSettings();
}

/* ──────────── ROOM GRID (예약 화면) ──────────── */
function buildRoomGrid(){
  document.getElementById('roomGrid').innerHTML=rooms.map(r=>
    `<button class="room-btn" id="rb_${r.id}" onclick="selectRoom('${r.id}')">
       <span class="ri">${r.icon}</span>${r.name}
     </button>`
  ).join('');
}
function selectRoom(id){
  selRoom=id;
  document.querySelectorAll('.room-btn').forEach(b=>b.classList.remove('selected'));
  const btn=document.getElementById('rb_'+id);
  if(btn)btn.classList.add('selected');
  selStart=null;selDur=0;
  [1,2,3,4].forEach(n=>document.getElementById('dur_'+n).classList.remove('selected'));
  refreshSlots();
}

/* ──────────── SETTINGS – ROOM LIST ──────────── */
function renderRoomListSettings(){
  document.getElementById('roomListSettings').innerHTML=rooms.map((r,i)=>
    `<div class="room-list-item">
       <span class="room-list-icon">${r.icon}</span>
       <span class="room-list-name">${r.name}</span>
       <div class="room-list-btns">
         <button class="btn-edit-room" onclick="openEditRoom('${r.id}')">수정</button>
         <button class="btn-del-room" onclick="openDelRoom('${r.id}')">삭제</button>
       </div>
     </div>`
  ).join('');
}

function addRoom(){
  const icon=document.getElementById('newRoomIcon').value.trim()||'🏠';
  const name=document.getElementById('newRoomName').value.trim();
  if(!name){showToast('장소명을 입력해주세요','err');return;}
  rooms.push({id:'rm'+Date.now(),name,icon});
  document.getElementById('newRoomIcon').value='';
  document.getElementById('newRoomName').value='';
  renderRoomListSettings();
  showToast('장소가 추가되었습니다','ok');
}

function openEditRoom(id){
  editRoomId=id;
  const r=rooms.find(x=>x.id===id);if(!r)return;
  document.getElementById('editRoomIcon').value=r.icon;
  document.getElementById('editRoomName').value=r.name;
  document.getElementById('editRoomModal').classList.add('show');
}
function closeEditModal(){document.getElementById('editRoomModal').classList.remove('show');editRoomId=null;}
function saveEditRoom(){
  if(!editRoomId)return;
  const idx=rooms.findIndex(x=>x.id===editRoomId);if(idx<0)return;
  rooms[idx].icon=document.getElementById('editRoomIcon').value.trim()||rooms[idx].icon;
  rooms[idx].name=document.getElementById('editRoomName').value.trim()||rooms[idx].name;
  closeEditModal();renderRoomListSettings();showToast('장소가 수정되었습니다','ok');
}

function openDelRoom(id){
  delRoomId=id;
  const r=rooms.find(x=>x.id===id);if(!r)return;
  document.getElementById('delRoomText').textContent=`"${r.name}" 장소를 삭제하시겠습니까? 기존 예약 데이터는 유지됩니다.`;
  document.getElementById('delRoomModal').classList.add('show');
}
function confirmDelRoom(){
  if(!delRoomId)return;
  rooms=rooms.filter(r=>r.id!==delRoomId);
  closeModal('delRoomModal');delRoomId=null;
  renderRoomListSettings();showToast('장소가 삭제되었습니다');
}

/* ──────────── SLOTS ──────────── */
function getBookedSet(roomId,date){
  const s=new Set();
  reservations.filter(r=>r.room===roomId&&r.date===date).forEach(r=>{
    for(let i=0;i<r.durSlots;i++){const idx=SLOTS.indexOf(r.startSlot)+i;if(idx>=0&&idx<SLOTS.length)s.add(SLOTS[idx]);}
  });
  return s;
}
function refreshSlots(){
  const date=document.getElementById('resDate').value;
  const booked=(selRoom&&date)?getBookedSet(selRoom,date):new Set();
  document.getElementById('slotGrid').innerHTML=SLOTS.map(sl=>{
    const isBooked=booked.has(sl);
    const isSel=sl===selStart;
    const isPreview=selStart&&selDur>1&&!isSel&&(()=>{const si=SLOTS.indexOf(selStart),ti=SLOTS.indexOf(sl);return ti>si&&ti<si+selDur;})();
    let cls='slot-btn';
    if(isSel)cls+=' selected';
    else if(isPreview)cls+=' preview';
    else if(isBooked)cls+=' booked';
    const ni=SLOTS.indexOf(sl)+1;
    const ns=ni<SLOTS.length?SLOTS[ni]:'';
    const label=ns?`${sl}~${ns}`:sl;
    const onClick=isBooked?'':(`onclick="selectStart('${sl}')"`);
    return `<button class="${cls}" ${onClick}>${label}</button>`;
  }).join('');
  updateTimeResult();
}
function selectStart(sl){selStart=sl;if(selDur===0){selDur=1;document.getElementById('dur_1').classList.add('selected');}clampDur();refreshSlots();}
function selectDur(n){if(!selStart){showToast('시작 시간을 먼저 선택해주세요','err');return;}selDur=n;[1,2,3,4].forEach(i=>document.getElementById('dur_'+i).classList.toggle('selected',i===n));clampDur();refreshSlots();}
function clampDur(){if(!selStart)return;const idx=SLOTS.indexOf(selStart);const mx=Math.min(4,SLOTS.length-1-idx);if(selDur>mx){selDur=mx;[1,2,3,4].forEach(i=>document.getElementById('dur_'+i).classList.toggle('selected',i===selDur));}}
function getEndSlot(){if(!selStart||selDur===0)return null;return addSlots(selStart,selDur);}
function checkConflict(){if(!selRoom||!selStart||selDur===0)return false;const date=document.getElementById('resDate').value;if(!date)return false;const booked=getBookedSet(selRoom,date);for(let i=0;i<selDur;i++){const idx=SLOTS.indexOf(selStart)+i;if(idx>=SLOTS.length||booked.has(SLOTS[idx]))return true;}return false;}
const DUR_LABEL={1:'30분',2:'1시간',3:'1시간 30분',4:'2시간'};
function updateTimeResult(){const el=document.getElementById('timeResult');if(!selStart||selDur===0){el.className='time-result';return;}const end=getEndSlot();if(!end){el.className='time-result warn';el.textContent='⚠️ 시간 범위를 초과합니다';return;}if(checkConflict()){el.className='time-result bad';el.textContent='⚠️ 이미 예약된 시간이 포함되어 있습니다';}else{el.className='time-result ok';el.textContent=`✅ ${selStart} ~ ${end} (${DUR_LABEL[selDur]}) 예약 가능`;}}

/* ──────────── SUBMIT ──────────── */
function submitReservation(){
  const cellName=document.getElementById('cellName').value.trim();
  const personName=document.getElementById('personName').value.trim();
  const date=document.getElementById('resDate').value;
  if(!selRoom){showToast('장소를 선택해주세요','err');return;}
  if(!date){showToast('날짜를 선택해주세요','err');return;}
  if(!selStart){showToast('시작 시간을 선택해주세요','err');return;}
  if(selDur===0){showToast('이용 시간을 선택해주세요','err');return;}
  if(!cellName){showToast('셀 이름을 입력해주세요','err');return;}
  if(!personName){showToast('예약자 이름을 입력해주세요','err');return;}
  if(!getEndSlot()){showToast('시간 범위를 초과했습니다','err');return;}
  if(checkConflict()){showToast('이미 예약된 시간입니다','err');return;}
  const room=rooms.find(r=>r.id===selRoom);
  reservations.push({id:genId(),room:selRoom,roomName:room.name,date,startSlot:selStart,endSlot:getEndSlot(),durSlots:selDur,durLabel:DUR_LABEL[selDur],cellName,personName,createdAt:new Date().toISOString()});
  saveRes();showToast(`✅ ${cellName} 예약 완료!`,'ok');
  selRoom=null;selStart=null;selDur=0;
  document.querySelectorAll('.room-btn').forEach(b=>b.classList.remove('selected'));
  [1,2,3,4].forEach(n=>document.getElementById('dur_'+n).classList.remove('selected'));
  document.getElementById('cellName').value='';document.getElementById('personName').value='';
  document.getElementById('timeResult').className='time-result';refreshSlots();
}

/* ──────────── LIST ──────────── */
function buildFilterOptions(){
  const sel=document.getElementById('filterRoom');
  while(sel.options.length>1)sel.remove(1);
  rooms.forEach(r=>{const o=document.createElement('option');o.value=r.id;o.textContent=r.name;sel.appendChild(o);});
}
function renderList(){
  const fr=document.getElementById('filterRoom').value;
  const fd=document.getElementById('filterDate').value;
  const fs=document.getElementById('filterSearch').value.trim().toLowerCase();
  const today=new Date().toISOString().split('T')[0];
  let list=[...reservations];
  if(fr)list=list.filter(r=>r.room===fr);
  if(fd)list=list.filter(r=>r.date===fd);
  if(fs)list=list.filter(r=>r.cellName.toLowerCase().includes(fs)||r.personName.toLowerCase().includes(fs));
  list.sort((a,b)=>a.date!==b.date?(a.date>b.date?1:-1):(a.startSlot>b.startSlot?1:-1));
  const c=document.getElementById('resList');
  if(!list.length){c.innerHTML=`<div class="empty-state"><div class="ei">📭</div><p>예약 내역이 없습니다</p></div>`;return;}
  c.innerHTML=list.map(r=>{
    const past=r.date<today;
    const room=rooms.find(x=>x.id===r.room);
    const ds=r.date.slice(2).replace(/-/g,'.');
    return `<div class="res-item${past?' past':''}">
      <div class="res-left">
        <div class="res-badges"><span class="badge badge-room">${room?.icon||'🏠'} ${r.roomName}</span><span class="badge badge-time">⏰ ${r.startSlot}~${r.endSlot}</span>${past?'<span class="badge badge-done">완료</span>':''}</div>
        <div class="res-main">${r.cellName} · ${r.personName}</div>
        <div class="res-sub">📅 ${ds} · ${r.durLabel}</div>
      </div>
      ${!past?`<button class="btn-cancel" onclick="openCancel('${r.id}','${r.cellName}','${r.personName}')">취소</button>`:''}
    </div>`;
  }).join('');
}
function openCancel(id,cell,name){cancelId=id;document.getElementById('cancelText').textContent=`${cell} (${name}) 예약을 취소하시겠습니까?`;document.getElementById('cancelModal').classList.add('show');}
function confirmCancel(){if(!cancelId)return;reservations=reservations.filter(r=>r.id!==cancelId);saveRes();closeModal('cancelModal');renderList();showToast('예약이 취소되었습니다');}

/* ──────────── MODAL HELPER ──────────── */
function closeModal(id){document.getElementById(id).classList.remove('show');}

/* ──────────── CALENDAR ──────────── */
function initCal(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
function changeMonth(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function renderCalendar(){
  const mN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${mN[calMonth]}`;
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0),sd=first.getDay();
  const todayStr=new Date().toISOString().split('T')[0];
  let html=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-dh">${d}</div>`).join('');
  for(let i=0;i<sd;i++){const pd=new Date(calYear,calMonth,-sd+i+1);html+=`<div class="cal-day other"><div class="dn">${pd.getDate()}</div></div>`;}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cnt=reservations.filter(r=>r.date===ds).length;
    const dow=new Date(calYear,calMonth,d).getDay();
    const cls=['cal-day',ds===todayStr?'today':'',ds===selCalDate?'sel':'',dow===0?'sun':'',dow===6?'sat':''].filter(Boolean).join(' ');
    const dots=Array.from({length:Math.min(cnt,4)},()=>'<div class="dot"></div>').join('');
    html+=`<div class="${cls}" onclick="selCal('${ds}')"><div class="dn">${d}</div><div class="dot-row">${dots}</div></div>`;
  }
  const rem=(7-(sd+last.getDate())%7)%7;
  for(let i=1;i<=rem;i++)html+=`<div class="cal-day other"><div class="dn">${i}</div></div>`;
  document.getElementById('calGrid').innerHTML=html;
  if(selCalDate)renderDayDetail(selCalDate);
}
function selCal(ds){selCalDate=ds;renderCalendar();renderDayDetail(ds);}
function renderDayDetail(ds){
  const wd=['일','월','화','수','목','금','토'],d=new Date(ds+'T00:00:00');
  const items=reservations.filter(r=>r.date===ds).sort((a,b)=>a.startSlot>b.startSlot?1:-1);
  document.getElementById('ddTitle').textContent=`📆 ${ds.slice(5).replace('-','/')} (${wd[d.getDay()]}) · ${items.length}건`;
  document.getElementById('ddContent').innerHTML=!items.length?'<p style="font-size:13px;color:var(--text-muted);text-align:center;padding:14px;">이 날은 예약이 없습니다</p>':
    items.map(r=>{const room=rooms.find(x=>x.id===r.room);return`<div class="tl-item"><div class="tl-time">${r.startSlot}</div><div class="tl-bar"></div><div class="tl-body"><div class="tl-name">${r.cellName} · ${r.personName}</div><div class="tl-info">${room?.icon||'🏠'} ${r.roomName} · ${r.startSlot}~${r.endSlot} (${r.durLabel})</div></div></div>`;}).join('');
  document.getElementById('dayDetail').style.display='block';
}

/* ──────────── STATS ──────────── */
function renderStats(){
  const total=reservations.length,today=new Date().toISOString().split('T')[0];
  const upcoming=reservations.filter(r=>r.date>=today).length;
  const nm=new Date(),mStr=`${nm.getFullYear()}-${String(nm.getMonth()+1).padStart(2,'0')}`;
  const thisM=reservations.filter(r=>r.date.startsWith(mStr)).length;
  const totalHr=(reservations.reduce((s,r)=>s+r.durSlots,0)*0.5);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">전체 예약</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${upcoming}</div><div class="stat-lbl">예정 예약</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--success)">${thisM}</div><div class="stat-lbl">이번 달</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#8A5C00">${totalHr}</div><div class="stat-lbl">총 이용 시간(h)</div></div>`;
  const roomCnt={};reservations.forEach(r=>{roomCnt[r.roomName]=(roomCnt[r.roomName]||0)+1;});
  const mx=Math.max(...Object.values(roomCnt),1);
  document.getElementById('roomBars').innerHTML=rooms.map(r=>{const c=roomCnt[r.name]||0;return`<div class="ru-item"><div class="ru-top"><span class="ru-name">${r.icon} ${r.name}</span><span class="ru-cnt">${c}회</span></div><div class="ru-bg"><div class="ru-fill" style="width:${Math.round(c/mx*100)}%"></div></div></div>`;}).join('');
  const mCnt={};reservations.forEach(r=>{const m=r.date.slice(0,7);mCnt[m]=(mCnt[m]||0)+1;});
  const mKeys=Object.keys(mCnt).sort().slice(-6);
  if(!mKeys.length){document.getElementById('monthBars').innerHTML='<p style="font-size:13px;color:var(--text-muted);text-align:center;padding:14px;">데이터가 없습니다</p>';return;}
  const mxM=Math.max(...mKeys.map(k=>mCnt[k]),1);
  document.getElementById('monthBars').innerHTML=`<div style="display:flex;align-items:flex-end;gap:8px;height:90px;">${mKeys.map(k=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;"><span style="font-size:10px;font-weight:700;color:var(--primary)">${mCnt[k]}</span><div style="width:100%;background:var(--primary);border-radius:4px 4px 0 0;height:${Math.round(mCnt[k]/mxM*80)+4}px;"></div><span style="font-size:10px;color:var(--text-muted)">${k.slice(5)}월</span></div>`).join('')}</div>`;
}

/* ──────────── INIT ──────────── */
loadAll();
applySettings();
buildRoomGrid();
buildFilterOptions();
document.getElementById('resDate').value=new Date().toISOString().split('T')[0];
document.getElementById('resDate').addEventListener('change',refreshSlots);
initCal();
refreshSlots();
</script>
</body>
